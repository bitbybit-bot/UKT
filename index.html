<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pembelajaran Interaktif & Quiz Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

  <header class="bg-blue-600 text-white p-4 shadow-md">
    <h1 class="text-xl font-bold text-center">Platform Modul & Quiz AI Interaktif</h1>
  </header>

  <main class="container mx-auto p-4 flex-grow flex flex-col md:flex-row gap-4">
    
    <div class="w-full md:w-1/2 flex flex-col bg-white p-4 rounded-lg shadow">
      
      <div class="mb-4 space-y-3">
        <div>
          <label class="block text-sm font-medium text-gray-700">Gemini API Key:</label>
          <input type="password" id="apiKey" placeholder="Masukkan Gemini API Key Anda" class="w-full p-2 border rounded mt-1 text-sm">
        </div>

        <div class="flex gap-2">
          <div class="flex-grow">
            <label class="block text-sm font-medium text-gray-700">Pilih File PDF (GitHub Repo):</label>
            <select id="pdfSelect" class="w-full p-2 border rounded mt-1 text-sm" disabled>
              <option value="">-- Muat Repositori Terlebih Dahulu --</option>
            </select>
          </div>
          <button id="btnLoadRepo" onclick="fetchGithubRepo()" class="mt-auto bg-gray-800 text-white px-3 py-2 rounded text-sm hover:bg-gray-700">
            Fetch Repo
          </button>
        </div>

        <button id="btnGenerate" onclick="generateQuiz()" class="w-full bg-green-600 text-white py-2 rounded font-semibold hover:bg-green-700 disabled:opacity-50" disabled>
          ✨ Buat Kuis Otomatis dari PDF
        </button>
      </div>

      <div class="flex-grow border rounded bg-gray-50 flex items-center justify-center min-h-[400px]">
        <iframe id="pdfViewer" class="w-full h-full min-h-[500px] hidden" frameborder="0"></iframe>
        <p id="pdfPlaceholder" class="text-gray-400 text-sm">Pilih PDF di atas untuk menampilkan dokumen</p>
      </div>
    </div>

    <div class="w-full md:w-1/2 bg-white p-4 rounded-lg shadow flex flex-col">
      <h2 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">Kuis Pemahaman Modul</h2>
      
      <div id="loading" class="hidden text-center my-auto py-8">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
        <p class="text-sm text-gray-600 mt-2">Sedang membaca PDF & membuat soal kuis via AI...</p>
      </div>

      <div id="quizContainer" class="flex-grow overflow-y-auto space-y-6 max-h-[600px] pr-2">
        <p class="text-gray-400 text-sm text-center my-auto">Klik tombol "Buat Kuis Otomatis" untuk menguji pemahaman Anda.</p>
      </div>

      <div id="quizFooter" class="hidden border-t pt-4 mt-4">
        <button onclick="submitQuiz()" class="w-full bg-blue-600 text-white py-2 rounded font-semibold hover:bg-blue-700">
          Kirim & Cek Jawaban
        </button>
        <div id="scoreResult" class="text-center font-bold text-lg mt-3"></div>
      </div>
    </div>

  </main>

  <script>
    // Configuration GitHub Repository Anda
    const GITHUB_OWNER = 'bitbybit-bot'; // Ganti dengan username GitHub Anda
    const GITHUB_REPO = 'UKT';   // Ganti dengan nama repository Anda
    const GITHUB_BRANCH = 'main';     // Branch utama (main / master)

    let generatedQuestions = [];

    // 1. Ambil daftar file PDF dari GitHub REST API
    async function fetchGithubRepo() {
      const select = document.getElementById('pdfSelect');
      select.innerHTML = '<option value="">Memuat file...</option>';

      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents`);
        const files = await response.json();
        
        // Filter hanya file ber-ekstensi .pdf
        const pdfFiles = files.filter(file => file.name.endsWith('.pdf'));

        select.innerHTML = '<option value="">-- Pilih Materi PDF --</option>';
        if (pdfFiles.length === 0) {
          alert('Tidak ditemukan file .pdf pada repositori tersebut.');
          return;
        }

        pdfFiles.forEach(file => {
          const rawUrl = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${file.path}`;
          const option = document.createElement('option');
          option.value = rawUrl;
          option.textContent = file.name;
          select.appendChild(option);
        });

        select.disabled = false;
        document.getElementById('btnGenerate').disabled = false;
      } catch (err) {
        alert('Gagal mengambil data repository. Pastikan Owner dan Repo sudah benar.');
        console.error(err);
      }
    }

    // Event Handler saat PDF dipilih di dropdown
    document.getElementById('pdfSelect').addEventListener('change', function(e) {
      const url = e.target.value;
      const iframe = document.getElementById('pdfViewer');
      const placeholder = document.getElementById('pdfPlaceholder');

      if (url) {
        // Render via standard PDF embed (Google Drive viewer bisa digunakan jika raw URL diblokir CORS browser)
        iframe.src = url;
        iframe.classList.remove('hidden');
        placeholder.classList.add('hidden');
      } else {
        iframe.classList.add('hidden');
        placeholder.classList.remove('hidden');
      }
    });

    // 2. Ekstraksi Teks PDF Menggunakan PDF.js
    async function extractTextFromPDF(pdfUrl) {
      const loadingTask = pdfjsLib.getDocument(pdfUrl);
      const pdf = await loadingTask.promise;
      let fullText = '';

      // Batasi pembacaan maksimal 5 halaman pertama agar tidak kelebihan token API
      const maxPages = Math.min(pdf.numPages, 5); 

      for (let i = 1; i <= maxPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(' ');
        fullText += pageText + ' ';
      }
      return fullText;
    }

    // 3. Generasi Soal via Gemini AI API
    async function generateQuiz() {
      const apiKey = document.getElementById('apiKey').value;
      const pdfUrl = document.getElementById('pdfSelect').value;

      if (!apiKey) return alert('Silakan masukkan Gemini API Key Anda!');
      if (!pdfUrl) return alert('Silakan pilih file PDF terlebih dahulu!');

      // UI Loading
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('quizFooter').classList.add('hidden');

      try {
        // Step A: Ekstrak Teks
        const extractedText = await extractTextFromPDF(pdfUrl);

        // Step B: Request ke Gemini API
        const prompt = `
          Berdasarkan teks materi berikut, buatkan 3 soal pilihan ganda untuk menguji pemahaman.
          Format respon WAJIB JSON murni tanpa markdown, dengan skema array object seperti ini:
          [
            {
              "question": "Pertanyaan?",
              "options": ["Opsi A", "Opsi B", "Opsi C", "Opsi D"],
              "answer": 0 // index jawaban yang benar (0-3)
            }
          ]

          Materi:
          ${extractedText.substring(0, 4000)} // Potong teks jika terlalu panjang
        `;

        const apiResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }]
          })
        });

        const data = await apiResponse.json();
        let rawJsonText = data.candidates[0].content.parts[0].text;
        
        // Membersihkan format markdown jika AI menyertakannya
        rawJsonText = rawJsonText.replace(/```json/g, '').replace(/```/g, '').trim();
        
        generatedQuestions = JSON.parse(rawJsonText);
        
        // Step C: Render Soal ke Layar
        renderQuiz(generatedQuestions);

      } catch (error) {
        alert('Gagal membuat kuis. Pastikan API Key valid dan format file PDF terbaca.');
        console.error(error);
      } finally {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('quizContainer').classList.remove('hidden');
      }
    }

    // 4. Render tampilan soal pilihan ganda
    function renderQuiz(questions) {
      const container = document.getElementById('quizContainer');
      container.innerHTML = '';

      questions.forEach((q, qIndex) => {
        const qCard = document.createElement('div');
        qCard.className = 'p-4 border rounded bg-gray-50';

        let optionsHTML = '';
        q.options.forEach((opt, oIndex) => {
          optionsHTML += `
            <label class="flex items-center space-x-2 text-sm p-2 rounded hover:bg-gray-100 cursor-pointer">
              <input type="radio" name="question-${qIndex}" value="${oIndex}" class="form-radio text-blue-600">
              <span>${opt}</span>
            </label>
          `;
        });

        qCard.innerHTML = `
          <p class="font-semibold text-gray-800 mb-2">${qIndex + 1}. ${q.question}</p>
          <div class="space-y-1">${optionsHTML}</div>
        `;
        container.appendChild(qCard);
      });

      document.getElementById('quizFooter').classList.remove('hidden');
      document.getElementById('scoreResult').innerText = '';
    }

    // 5. Hitung Skor Jawaban
    function submitQuiz() {
      let score = 0;

      generatedQuestions.forEach((q, qIndex) => {
        const selected = document.querySelector(`input[name="question-${qIndex}"]:checked`);
        if (selected && parseInt(selected.value) === q.answer) {
          score++;
        }
      });

      const finalScore = Math.round((score / generatedQuestions.length) * 100);
      const scoreResult = document.getElementById('scoreResult');
      scoreResult.innerText = `Skor Anda: ${finalScore} / 100 (${score} dari ${generatedQuestions.length} Soal Benar)`;
      
      if (finalScore >= 70) {
        scoreResult.className = 'text-center font-bold text-lg mt-3 text-green-600';
      } else {
        scoreResult.className = 'text-center font-bold text-lg mt-3 text-red-600';
      }
    }
  </script>
</body>
</html>
